# Render Blueprint — provisions the FastAPI service + managed PostgreSQL.
# Push the repo to GitHub, then in Render: New → Blueprint → connect this repo.

databases:
  - name: payroll-saas-db
    plan: free
    databaseName: payroll
    user: payroll
    postgresMajorVersion: "16"

services:
  - type: web
    name: payroll-saas-api
    runtime: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "8000"
      - key: ENV
        value: production
      - key: ALLOW_ANONYMOUS_API
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://peopleopslab.in,https://www.peopleopslab.in"
      - key: DATABASE_URL
        fromDatabase:
          name: payroll-saas-db
          property: connectionString
